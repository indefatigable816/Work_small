<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog</title>
  <style>
    :root {
      --bg:       #f7f7f5;
      --surface:  #ffffff;
      --border:   #e6e6e0;
      --text:     #1a1a1a;
      --muted:    #6b6b6b;
      --accent:   #2563eb;
      --green:    #16a34a;
      --red:      #dc2626;
      --radius:   8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── Layout ─────────────────────────────────── */
    .wrap { max-width: 700px; margin: 0 auto; padding: 0 24px; }

    /* ── Header ─────────────────────────────────── */
    header {
      padding: 52px 0 36px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 44px;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
    }
    .blog-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -.4px;
      color: var(--text);
      text-decoration: none;
    }
    .blog-desc {
      color: var(--muted);
      font-size: 15px;
      margin-top: 5px;
    }
    .admin-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      opacity: .25;
      font-size: 18px;
      padding: 6px 8px;
      border-radius: 6px;
      line-height: 1;
      transition: opacity .2s;
      flex-shrink: 0;
    }
    .admin-btn:hover { opacity: 1; }

    /* ── Post cards ──────────────────────────────── */
    .post-list { list-style: none; }
    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 14px;
      transition: box-shadow .18s, border-color .18s;
    }
    .post-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      border-color: #d4d4cc;
    }
    .post-card a {
      display: block;
      padding: 22px 24px;
      text-decoration: none;
      color: inherit;
    }
    .post-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -.15px;
      margin-bottom: 4px;
    }
    .post-date {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .post-excerpt {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── States ─────────────────────────────────── */
    .state {
      text-align: center;
      padding: 72px 0;
      color: var(--muted);
      font-size: 15px;
    }

    /* ── Footer ─────────────────────────────────── */
    footer {
      margin-top: 64px;
      padding: 24px 0;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Modal ───────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 20px;
    }
    .overlay.hidden { display: none; }

    .modal {
      background: var(--surface);
      border-radius: 12px;
      width: 100%;
      max-width: 520px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,.25);
      overflow: hidden;
    }
    .modal-head {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .modal-head-title { font-weight: 600; font-size: 15px; }
    .modal-x {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 22px;
      line-height: 1;
      padding: 2px 6px;
    }
    /* Screen divs must also flex so modal-body can grow and scroll */
    #screenLogin, #screenPanel {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    .modal-body {
      padding: 22px;
      overflow-y: auto;
      flex: 1;
    }
    .modal-foot {
      padding: 14px 22px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    /* ── Form elements ───────────────────────────── */
    .field + .field { margin-top: 14px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 5px;
    }
    input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    input[type="password"]:focus { border-color: var(--accent); }

    .err { color: var(--red); font-size: 13px; margin-top: 6px; display: none; }

    /* ── Buttons ─────────────────────────────────── */
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 500;
      font-family: inherit;
      transition: background .15s, opacity .15s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:not(:disabled):hover { background: #1d4ed8; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg); }

    /* ── File toggles ────────────────────────────── */
    .hint {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .file-list { list-style: none; }
    .file-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .file-row:last-child { border-bottom: none; }
    .file-name {
      font-size: 13.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }
    /* toggle switch */
    .switch { position: relative; width: 38px; height: 21px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .track {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 21px;
      cursor: pointer;
      transition: background .2s;
    }
    .track::before {
      content: '';
      position: absolute;
      width: 15px; height: 15px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .switch input:checked + .track { background: var(--green); }
    .switch input:checked + .track::before { transform: translateX(17px); }

    /* ── Status banner ───────────────────────────── */
    .status-bar {
      padding: 9px 13px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 14px;
      line-height: 1.4;
    }
    .status-ok  { background: #dcfce7; color: #166534; }
    .status-err { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="header-row">
      <div>
        <a href="index.html" class="blog-title" id="blogTitle">Blog</a>
        <p class="blog-desc" id="blogDesc"></p>
      </div>
      <button class="admin-btn" id="adminBtn" title="Admin" aria-label="Admin panel">⚙</button>
    </div>
  </header>

  <main>
    <div class="state" id="stateLoading">Loading posts…</div>
    <ul class="post-list" id="postList" style="display:none"></ul>
    <div class="state" id="stateEmpty" style="display:none">No posts published yet.</div>
    <div class="state" id="stateError" style="display:none"></div>
  </main>

  <footer>Powered by GitHub Pages</footer>
</div>

<!-- ── Admin modal ─────────────────────────────── -->
<div class="overlay hidden" id="overlay">
  <div class="modal" role="dialog" aria-modal="true" aria-label="Admin Panel">

    <div class="modal-head">
      <span class="modal-head-title">Admin Panel</span>
      <button class="modal-x" id="modalClose" aria-label="Close">×</button>
    </div>

    <!-- Login screen -->
    <div id="screenLogin">
      <div class="modal-body">
        <div class="field">
          <label for="pwInput">Admin password</label>
          <input type="password" id="pwInput" placeholder="Enter password" autocomplete="current-password" />
          <p class="err" id="loginErr">Incorrect password.</p>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" id="loginCancel">Cancel</button>
        <button class="btn btn-primary" id="loginSubmit">Unlock</button>
      </div>
    </div>

    <!-- Panel screen -->
    <div id="screenPanel" style="display:none">
      <div class="modal-body">
        <div id="statusBar"></div>
        <p class="hint">Toggle which posts are visible to readers. Click <strong>Save</strong> to commit changes to the repository.</p>
        <div class="state" id="filesLoading" style="padding:24px 0">Fetching files…</div>
        <ul class="file-list" id="fileList" style="display:none"></ul>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" id="logoutBtn">Log out</button>
        <button class="btn btn-primary" id="saveBtn">Save changes</button>
      </div>
    </div>

  </div>
</div>

<script>
  /* ─── Config & state ───────────────────────────────────────────── */
  const RAW = 'https://raw.githubusercontent.com';
  const GH  = 'https://api.github.com';

  let CFG = null;       // parsed config.json
  let PAT = null;       // decrypted GitHub PAT (in-memory only)
  let allMd = [];       // all .md paths in repo (fetched via API after login)
  let pubPaths = [];    // currently visible paths (from visibility.json)
  let pending = {};     // {path: bool} — admin's pending changes

  /* ─── Utilities ────────────────────────────────────────────────── */
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function rawURL(path) {
    return `${RAW}/${CFG.repo}/${CFG.branch}/${path}`;
  }

  async function sha256hex(text) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  /* Derive AES-GCM 256-bit key from password via PBKDF2 */
  async function deriveKey(password, salt, usage) {
    const km = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name:'PBKDF2', salt, iterations:100000, hash:'SHA-256' },
      km,
      { name:'AES-GCM', length:256 },
      false, [usage]
    );
  }

  /* Decrypt PAT — format: base64(16-byte salt ‖ 12-byte IV ‖ ciphertext) */
  async function decryptPAT(password, b64) {
    const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const salt = raw.slice(0, 16);
    const iv   = raw.slice(16, 28);
    const ct   = raw.slice(28);
    const key  = await deriveKey(password, salt, 'decrypt');
    const pt   = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
    return new TextDecoder().decode(pt);
  }

  /* Extract YAML-ish frontmatter */
  function parseFrontmatter(text) {
    const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---/);
    if (!m) return { meta:{}, body:text };
    const meta = {};
    for (const line of m[1].split('\n')) {
      const i = line.indexOf(':');
      if (i === -1) continue;
      const key = line.slice(0, i).trim();
      // Rejoin remaining colons (e.g. ISO datetimes like 2024-01-15T10:30:00)
      const val = line.slice(i + 1).trim().replace(/^["']|["']$/g, '');
      meta[key] = val;
    }
    return { meta, body: text.slice(m[0].length).trimStart() };
  }

  function slugToTitle(path) {
    return path
      .split('/').pop()
      .replace(/\.md$/i,'')
      .replace(/^\d{4}-\d{2}-\d{2}[-_]/,'')
      .replace(/[-_]/g,' ')
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  function extractDate(path, meta) {
    // Strip time portion from ISO datetime (e.g. "2024-01-15T10:30:00" → "2024-01-15")
    const raw = meta.date || path.split('/').pop().match(/^(\d{4}-\d{2}-\d{2})/)?.[1] || '';
    return raw.slice(0, 10);
  }

  function stripMarkdown(text) {
    return text
      .replace(/^#+\s.*/gm,'')
      .replace(/!\[.*?\]\(.*?\)/g,'')
      .replace(/\[([^\]]+)\]\([^)]+\)/g,'$1')
      .replace(/`{1,3}[^`\n]*`{1,3}/g,'')
      .replace(/[*_~`>#]/g,'')
      .replace(/\n+/g,' ')
      .trim();
  }

  /* ─── Blog rendering ───────────────────────────────────────────── */
  async function loadBlog() {
    const resp = await fetch('config.json');
    if (!resp.ok) throw new Error('config.json not found. See BLOG_SETUP.md.');
    CFG = await resp.json();

    // Validate config has been filled in
    if (!CFG.repo || CFG.repo === 'OWNER/REPO') {
      throw new Error('config.json has not been configured yet. Open setup.html to generate it.');
    }

    document.title = CFG.blogTitle || 'Blog';
    document.getElementById('blogTitle').textContent = CFG.blogTitle || 'Blog';
    if (CFG.blogDescription) {
      document.getElementById('blogDesc').textContent = CFG.blogDescription;
    }

    // Load visibility list
    const visResp = await fetch(rawURL('visibility.json'));
    pubPaths = visResp.ok ? await visResp.json() : [];

    const elLoading = document.getElementById('stateLoading');
    const elList    = document.getElementById('postList');
    const elEmpty   = document.getElementById('stateEmpty');

    if (pubPaths.length === 0) {
      elLoading.style.display = 'none';
      elEmpty.style.display = 'block';
      return;
    }

    // Fetch each post for preview
    const posts = (await Promise.all(pubPaths.map(async path => {
      try {
        const r = await fetch(rawURL(path));
        if (!r.ok) return null;
        const text = await r.text();
        const { meta, body } = parseFrontmatter(text);
        return {
          path,
          title:   meta.title  || slugToTitle(path),
          date:    extractDate(path, meta),
          excerpt: stripMarkdown(body).slice(0, 180)
        };
      } catch { return null; }
    }))).filter(Boolean);

    // Sort newest first (date string lexicographic works for YYYY-MM-DD)
    posts.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    elLoading.style.display = 'none';

    if (posts.length === 0) {
      elEmpty.style.display = 'block';
      return;
    }

    elList.style.display = 'block';
    for (const p of posts) {
      const li = document.createElement('li');
      li.className = 'post-card';
      li.innerHTML = `<a href="post.html?file=${encodeURIComponent(p.path)}">
        <div class="post-title">${esc(p.title)}</div>
        ${p.date ? `<div class="post-date">${esc(p.date)}</div>` : ''}
        ${p.excerpt ? `<div class="post-excerpt">${esc(p.excerpt)}</div>` : ''}
      </a>`;
      elList.appendChild(li);
    }
  }

  /* ─── Admin modal ──────────────────────────────────────────────── */
  const overlay      = document.getElementById('overlay');
  const screenLogin  = document.getElementById('screenLogin');
  const screenPanel  = document.getElementById('screenPanel');

  document.getElementById('adminBtn').addEventListener('click', openAdmin);
  document.getElementById('modalClose').addEventListener('click', closeAdmin);
  document.getElementById('loginCancel').addEventListener('click', closeAdmin);
  document.getElementById('logoutBtn').addEventListener('click', logout);
  document.getElementById('loginSubmit').addEventListener('click', doLogin);
  document.getElementById('saveBtn').addEventListener('click', saveVisibility);
  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeAdmin();
  });

  function openAdmin() {
    overlay.classList.remove('hidden');
    setTimeout(() => document.getElementById('pwInput').focus(), 50);
  }

  function closeAdmin() {
    overlay.classList.add('hidden');
  }

  function logout() {
    PAT = null;
    screenPanel.style.display = 'none';
    screenLogin.style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('loginErr').style.display = 'none';
  }

  async function doLogin() {
    const pw  = document.getElementById('pwInput').value;
    const btn = document.getElementById('loginSubmit');
    const err = document.getElementById('loginErr');
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Checking…';

    try {
      const hash = await sha256hex(pw);
      if (hash !== CFG.adminPasswordHash) {
        err.style.display = 'block';
        return;
      }
      PAT = await decryptPAT(pw, CFG.encryptedPAT);
      screenLogin.style.display = 'none';
      screenPanel.style.display = 'block';
      loadAllFiles();
    } catch (e) {
      err.textContent = 'Error: ' + e.message;
      err.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Unlock';
    }
  }

  async function loadAllFiles() {
    document.getElementById('filesLoading').style.display = 'block';
    document.getElementById('fileList').style.display = 'none';

    const SKIP = new Set(['README.md','BLOG_SETUP.md','setup.html']);

    try {
      const r = await fetch(`${GH}/repos/${CFG.repo}/git/trees/${CFG.branch}?recursive=1`, {
        headers: { Authorization: `Bearer ${PAT}` }
      });
      if (!r.ok) throw new Error(`GitHub API ${r.status}: ${(await r.json()).message}`);
      const data = await r.json();

      allMd = data.tree
        .filter(f => f.type === 'blob' && f.path.match(/\.md$/i) && !SKIP.has(f.path.split('/').pop()))
        .map(f => f.path)
        .sort();

      // Build pending visibility map
      pending = {};
      for (const p of allMd) pending[p] = pubPaths.includes(p);

      renderFileList();
    } catch(e) {
      setStatus('Error loading files: ' + e.message, 'err');
    } finally {
      document.getElementById('filesLoading').style.display = 'none';
    }
  }

  function renderFileList() {
    const ul = document.getElementById('fileList');
    ul.innerHTML = '';

    if (allMd.length === 0) {
      ul.innerHTML = '<li style="padding:12px 0;font-size:14px;color:var(--muted)">No markdown files found in this repository.</li>';
    } else {
      for (const path of allMd) {
        const id = 'sw-' + Math.random().toString(36).slice(2);
        const li = document.createElement('li');
        li.className = 'file-row';
        li.innerHTML = `
          <span class="file-name" title="${esc(path)}">${esc(path)}</span>
          <label class="switch" title="${pending[path] ? 'Visible' : 'Hidden'}">
            <input type="checkbox" id="${id}" data-path="${esc(path)}" ${pending[path] ? 'checked' : ''}>
            <span class="track"></span>
          </label>`;
        li.querySelector('input').addEventListener('change', e => {
          pending[e.target.dataset.path] = e.target.checked;
        });
        ul.appendChild(li);
      }
    }

    ul.style.display = 'block';
  }

  async function saveVisibility() {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const newList = allMd.filter(p => pending[p]);

      // Get existing file SHA (needed for update)
      const getResp = await fetch(`${GH}/repos/${CFG.repo}/contents/visibility.json`, {
        headers: { Authorization: `Bearer ${PAT}` }
      });
      let sha;
      if (getResp.ok) sha = (await getResp.json()).sha;

      // Commit updated visibility.json
      const body = {
        message: `Update post visibility [${new Date().toISOString().slice(0,10)}]`,
        content: btoa(unescape(encodeURIComponent(JSON.stringify(newList, null, 2)))),
        branch: CFG.branch
      };
      if (sha) body.sha = sha;

      const putResp = await fetch(`${GH}/repos/${CFG.repo}/contents/visibility.json`, {
        method: 'PUT',
        headers: {
          Authorization: `Bearer ${PAT}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      if (!putResp.ok) {
        const detail = await putResp.json();
        throw new Error(detail.message || `HTTP ${putResp.status}`);
      }

      pubPaths = newList;
      setStatus('✓ Saved! Changes will appear on the blog within ~60 seconds.', 'ok');
    } catch(e) {
      setStatus('Save failed: ' + e.message, 'err');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save changes';
    }
  }

  function setStatus(msg, type) {
    const el = document.getElementById('statusBar');
    el.innerHTML = `<div class="status-bar status-${type}">${esc(msg)}</div>`;
    setTimeout(() => { el.innerHTML = ''; }, 7000);
  }

  /* ─── Boot ─────────────────────────────────────────────────────── */
  loadBlog().catch(err => {
    document.getElementById('stateLoading').style.display = 'none';
    const el = document.getElementById('stateError');
    el.textContent = err.message;
    el.style.display = 'block';
  });
</script>
</body>
</html>
