# =============================================================================
# EXPERIMENT 3: Lapatinib Binding to HER2 L755S
# =============================================================================
  - experiment_id: "EXP003"
    name: "Lapatinib_L755S_vs_WT"
    description: "Evaluate Lapatinib binding to HER2 L755S (kinase domain, active conformation)"
    hypothesis: "L755S stabilizes active kinase state, reducing Lapatinib binding (low PTM)"
    stoichiometry: "1:1"  # 1 HER2 : 1 Lapatinib
    
    groups:
      # Experimental group
      - group_id: "EXP003_MUT"
        name: "HER2_L755S_Lapatinib"
        variant: "L755S"
        mutation_description: "Leucine to Serine at position 755 in kinase domain"
        complex_type: "monomer_ligand"
        
        sequences:
          - chain_id: "A"
            chain_type: "protein"
            description: "HER2 L755S Kinase Domain"
            sequence: ""
            mutations:
              - position: 755
                from: "L"
                to: "S"
                domain: "kinase"
                effect: "stabilizes_active_conformation"
                
          - chain_id: "B"
            chain_type: "ligand"
            description: "Lapatinib (small molecule inhibitor)"
            smiles: "CS(=O)(=O)CCNCC1=CC=C(O1)C2=CC3=C(C=C2)N=CN=C3NC4=CC(=C(C=C4)OCC5=CC(=CC=C5)F)Cl"
            
      
      # Control group
      - group_id: "EXP003_WT"
        name: "HER2_WT_Lapatinib"
        variant: "wild_type"
        complex_type: "monomer_ligand"
        
        sequences:
          - chain_id: "A"
            chain_type: "protein"
            description: "HER2 Wild-Type Kinase Domain"
            sequence: ""
            
          - chain_id: "B"
            chain_type: "ligand"
            description: "Lapatinib"
            smiles: "CS(=O)(=O)CCNCC1=CC=C(O1)C2=CC3=C(C=C2)N=CN=C3NC4=CC(=C(C=C4)OCC5=CC(=CC=C5)F)Cl"
            

# =============================================================================
# EXPERIMENT 4: Lapatinib Binding to HER2 K753E
# =============================================================================
  - experiment_id: "EXP004"
    name: "Lapatinib_K753E_vs_WT"
    description: "Evaluate Lapatinib binding to HER2 K753E (kinase domain, resistant phenotype)"
    hypothesis: "K753E alters charge/conformation, reducing Lapatinib engagement (low PTM)"
    stoichiometry: "1:1"  # 1 HER2 : 1 Lapatinib
    
    groups:
      # Experimental group
      - group_id: "EXP004_MUT"
        name: "HER2_K753E_Lapatinib"
        variant: "K753E"
        mutation_description: "Lysine to Glutamate at position 753 in kinase domain"
        complex_type: "monomer_ligand"
        
        sequences:
          - chain_id: "A"
            chain_type: "protein"
            description: "HER2 K753E Kinase Domain"
            sequence: ""
            mutations:
              - position: 753
                from: "K"
                to: "E"
                domain: "kinase"
                effect: "charge_reversal_reduces_binding"
                
          - chain_id: "B"
            chain_type: "ligand"
            description: "Lapatinib"
            smiles: "CS(=O)(=O)CCNCC1=CC=C(O1)C2=CC3=C(C=C2)N=CN=C3NC4=CC(=C(C=C4)OCC5=CC(=CC=C5)F)Cl"
            
      
      # Control group - SHARED WITH EXP003
      - group_id: "EXP004_WT"
        name: "HER2_WT_ICD_Lapatinib"
        variant: "wild_type"
        shared_control: true
        reference_experiment: "EXP003_WT"
        note: "Uses same WT kinase domain control as L755S experiment - no need to re-run"
        complex_type: "monomer_ligand"

# =============================================================================
# RANDOM SEEDS
# =============================================================================
seeds:
  - 1
  - 2
  - 3
  - 4
  - 5

# =============================================================================
# OUTPUT SPECIFICATIONS
# =============================================================================
output_requirements:
  structural_files:
    - format: "cif"
      description: "mmCIF format with coordinates"
      include_hydrogens: false
      
  confidence_files:
    - format: "npz"
      description: "Compressed numpy array with all confidence metrics"
      contents:
        - pae          # NxN matrix, predicted aligned error
        - plddt        # N-length array, per-residue confidence
        - ptm          # Single value, overall structure quality
        - iptm         # Single value, interface quality
        - ipae         # Interface-specific PAE
        - confidence_score  # Overall confidence
        
  json_summary:
    filename: "confidence_summary.json"
    include:
      - confidence_score
      - ptm
      - iptm
      - ligand_iptm  # For small molecule complexes
      - protein_iptm # For protein-protein complexes
      - complex_plddt
      - complex_iplddt
      - complex_pde
      - complex_ipde
      - chains_ptm
      - pair_chains_iptm
      
  ranking_file:
    filename: "ranking_debug.json"
    description: "Model ranking information"
    
  plots:
    generate_pae_plots: true
    generate_plddt_plots: true
    format: "png"
    dpi: 300

# =============================================================================
# QUALITY CONTROL
# =============================================================================
quality_control:
  minimum_plddt_threshold: 50  # Reject models with mean pLDDT < 50
  flag_low_confidence_interfaces: true
  interface_iptm_threshold: 0.3
  
  validation_checks:
    - check_clashes: true
    - check_geometry: true
    - verify_mutations: true
    - validate_ligand_placement: true

# =============================================================================
# EXPERIMENT SUMMARY
# =============================================================================
experiment_summary:
  total_experiments: 6
  antibody_experiments:
    - EXP001A: "Δ16 Dimer + Trastuzumab"
    - EXP001B: "Δ16 Monomer + Trastuzumab"
    - EXP002A: "S310F Dimer + Pertuzumab"
    - EXP002B: "S310F Monomer + Pertuzumab"
  small_molecule_experiments:
    - EXP003: "L755S + Lapatinib"
    - EXP004: "K753E + Lapatinib"
  
  unique_control_groups: 3
  controls:
    - WT_ECD_Dimer: "Used by EXP001A and EXP002A"
    - WT_ECD_Monomer: "Used by EXP001B and EXP002B"
    - WT_ICD: "Used by EXP003 and EXP004"

