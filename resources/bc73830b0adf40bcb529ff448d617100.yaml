# Configuration for HER2 Variant Drug Binding Studies
# Project: HER2 Therapeutic Resistance Mechanisms
# Date: 2026-02-13
# Prepared for: Mutation-Aware-Protein-Folding Model Validation Run

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================
global_config:
  project_name: "HER2_Drug_Resistance_Validation"
  description: "Comparative analysis of HER2 variants with therapeutic agents - DIMER and MONOMER configurations"
  
  # Sampling parameters
  samples_per_seed: 5
  num_seeds: 5
  total_samples_per_experiment: 25  # 5 seeds × 5 samples = 25 models per complex
  
  # Control group sharing strategy
  shared_controls:
    WT_ECD_DIMER: 
      experiments: ["EXP001A", "EXP002A"]
      description: "Wild-type ECD homodimer used for both Trastuzumab and Pertuzumab"
      run_once: true
      stoichiometry: "2:1:1"  # 2 HER2 ECD : 1 Heavy chain : 1 Light chain
    WT_ECD_MONOMER:
      experiments: ["EXP001B", "EXP002B"]
      description: "Wild-type ECD monomer used for both Trastuzumab and Pertuzumab"
      run_once: true
      stoichiometry: "1:1:1"  # 1 HER2 ECD : 1 Heavy chain : 1 Light chain
    WT_ICD:
      experiments: ["EXP003", "EXP004"]
      description: "Wild-type kinase domain used for both L755S and K753E Lapatinib experiments"
      run_once: true
      stoichiometry: "1:1"  # 1 HER2 kinase : 1 Lapatinib
  
  # Output requirements
  output_formats:
    - cif  # Crystallographic Information File (structural coordinates)
    - npz  # Compressed NumPy array (confidence metrics)
  
  confidence_metrics:
    - pae        # Predicted Aligned Error matrix
    - plddt      # per-residue confidence (predicted LDDT)
    - iptm       # Interface Predicted TM-score
    - ptm        # Predicted TM-score (overall)
    - ipae       # Interface PAE
    - confidence_score  # Overall confidence
    - chains_ptm        # Per-chain PTM
    - pair_chains_iptm  # Pairwise chain iPTM
  
  # Model settings
  model_type: 
  use_templates: false
  max_recycles: 3
  
  # File organization
  output_directory: "./HER2_validation_results"
  separate_by_experiment: true
  naming_convention: "{experiment}_{variant}_{drug}_{seed}_{sample}"

# =============================================================================
# EXPERIMENT 1A: Trastuzumab Binding to HER2 Δ16 DIMER
# =============================================================================
experiments:
  - experiment_id: "EXP001A"
    name: "Trastuzumab_Delta16_Dimer_vs_WT"
    description: "Evaluate Trastuzumab binding to HER2 Δ16 homodimer vs wild-type homodimer"
    hypothesis: "Δ16 homodimer shows reduced binding (low PTM) due to covalent dimerization"
    stoichiometry: "2:1:1"  # 2 HER2 : 1 Heavy : 1 Light
    
    groups:
      # Experimental group
      - group_id: "EXP001A_MUT"
        name: "HER2_Delta16_Dimer_Trastuzumab"
        variant: "Delta16"
        mutation_description: "Exon 16 deletion (amino acids 595-635 deleted from ECD)"
        complex_type: "homodimer_antibody"
        
        sequences:
          - chain_id: "A"
            chain_type: "protein"
            description: "HER2 Δ16 Extracellular Domain (Chain 1)"
            sequence: ""
            modifications:
              - type: "deletion"
                region: "exon16"
                residues: "595-635"
          
          - chain_id: "B"
            chain_type: "protein"
            description: "HER2 Δ16 Extracellular Domain (Chain 2)"
            sequence: ""
            
          - chain_id: "C"
            chain_type: "protein"
            description: "Trastuzumab Heavy Chain"
            sequence: ""
            
          - chain_id: "D"
            chain_type: "protein"
            description: "Trastuzumab Light Chain"
            sequence: "DIQMTQSPSSLSASVGDRVTITCRASQDVNTAVAWYQQKPGKAPKLLIYSASFLYSGVPSRFSGSRSGTDFTLTISSLQPEDFATYYCQQHYTTPPTFGQGTKVEIKRTVAAPSVFIFPPSDEQLKSGTASVVCLLNNFYPREAKVQWKVDNALQSGNSQESVTEQDSKDSTYSLSSTLTLSKADYEKHKVYACEVTHQGLSSPVTKSFNRGEC"
      
