<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    :root {
      --bg:      #f7f7f5;
      --surface: #ffffff;
      --border:  #e6e6e0;
      --text:    #1a1a1a;
      --muted:   #6b6b6b;
      --accent:  #2563eb;
      --green:   #16a34a;
      --radius:  8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    .wrap { max-width: 700px; margin: 0 auto; padding: 0 24px; }

    /* ── Nav bar ─────────────────────────────────── */
    .topbar {
      padding: 22px 0 0;
      margin-bottom: 0;
    }
    .back {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .back:hover { color: var(--text); }

    /* ── Post header ─────────────────────────────── */
    .post-head {
      padding: 32px 0 22px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }
    .post-head h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -.5px;
      line-height: 1.3;
      margin-bottom: 12px;
    }
    .post-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .post-date { font-size: 14px; color: var(--muted); }

    /* ── Share button ────────────────────────────── */
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 13px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      transition: background .15s, border-color .15s, color .15s;
    }
    .share-btn:hover { background: var(--bg); }
    .share-btn.copied { border-color: var(--green); color: var(--green); }

    /* ── Article body ────────────────────────────── */
    article {
      font-size: 16px;
      line-height: 1.75;
      margin-bottom: 56px;
    }
    article > * + * { margin-top: 1.2em; }

    article h1, article h2, article h3, article h4, article h5 {
      font-weight: 650;
      letter-spacing: -.2px;
      line-height: 1.35;
      margin-top: 2em;
      margin-bottom: .4em;
    }
    article h1 { font-size: 22px; }
    article h2 { font-size: 20px; }
    article h3 { font-size: 18px; }
    article h4 { font-size: 16px; }

    article p { margin-bottom: 1em; }

    article a { color: var(--accent); }
    article a:hover { text-decoration: underline; }

    article ul, article ol {
      padding-left: 24px;
      margin-bottom: 1em;
    }
    article li { margin-bottom: .3em; }

    article blockquote {
      border-left: 3px solid var(--border);
      padding-left: 18px;
      color: var(--muted);
      margin: 1.5em 0;
      font-style: italic;
    }

    article code {
      background: #f0f0ec;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: .88em;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    article pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 20px 22px;
      border-radius: var(--radius);
      overflow-x: auto;
      margin: 1.5em 0;
    }
    article pre code {
      background: none;
      padding: 0;
      font-size: 14px;
    }

    article img {
      max-width: 100%;
      border-radius: 6px;
      display: block;
      margin: 1.5em auto;
    }

    article table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin: 1.5em 0;
    }
    article th, article td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }
    article th { background: var(--bg); font-weight: 600; }

    article hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5em 0;
    }

    /* ── Comments ────────────────────────────────── */
    .comments {
      border-top: 1px solid var(--border);
      padding-top: 40px;
      margin-bottom: 56px;
    }
    .comments h2 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    /* ── States ─────────────────────────────────── */
    .state {
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
      font-size: 15px;
    }
    .state a { color: var(--accent); }

    footer {
      padding: 24px 0;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 0;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

<div class="wrap">

  <nav class="topbar">
    <a href="index.html" class="back">← Back</a>
  </nav>

  <!-- Loading / error states -->
  <div class="state" id="stateLoading">Loading…</div>
  <div class="state" id="stateNotFound" style="display:none">
    <p>Post not found or not yet published.</p>
    <p style="margin-top:8px"><a href="index.html">← Back to blog</a></p>
  </div>

  <!-- Post content (shown after load) -->
  <div id="postWrap" style="display:none">
    <div class="post-head">
      <h1 id="postTitle"></h1>
      <div class="post-meta-row">
        <span class="post-date" id="postDate"></span>
        <button class="share-btn" id="shareBtn">
          <!-- upload / share icon -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
            <polyline points="16 6 12 2 8 6"/>
            <line x1="12" y1="2" x2="12" y2="15"/>
          </svg>
          Share
        </button>
      </div>
    </div>

    <article id="articleBody"></article>

    <!-- Giscus comments (injected when enabled) -->
    <div class="comments" id="commentsWrap" style="display:none">
      <h2>Comments</h2>
      <div id="giscusMount"></div>
    </div>
  </div>

  <footer>
    <a href="index.html">← Back to blog</a>
  </footer>
</div>

<script>
  const RAW = 'https://raw.githubusercontent.com';

  /* ─── Utilities ─────────────────────────────────────────────────── */
  function parseFrontmatter(text) {
    const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---/);
    if (!m) return { meta:{}, body:text };
    const meta = {};
    for (const line of m[1].split('\n')) {
      const i = line.indexOf(':');
      if (i === -1) continue;
      const key = line.slice(0, i).trim();
      // Rejoin remaining colons (e.g. ISO datetimes like 2024-01-15T10:30:00)
      const val = line.slice(i + 1).trim().replace(/^["']|["']$/g, '');
      meta[key] = val;
    }
    return { meta, body: text.slice(m[0].length).trimStart() };
  }

  function slugToTitle(path) {
    return path
      .split('/').pop()
      .replace(/\.md$/i,'')
      .replace(/^\d{4}-\d{2}-\d{2}[-_]/,'')
      .replace(/[-_]/g,' ')
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  function extractDate(path, meta) {
    // Strip time portion from ISO datetime (e.g. "2024-01-15T10:30:00" → "2024-01-15")
    const raw = meta.date || path.split('/').pop().match(/^(\d{4}-\d{2}-\d{2})/)?.[1] || '';
    return raw.slice(0, 10);
  }

  /* ─── Load post ─────────────────────────────────────────────────── */
  async function loadPost() {
    const params = new URLSearchParams(window.location.search);
    const filePath = params.get('file');
    if (!filePath) { showNotFound(); return; }

    // Load config
    const cfgResp = await fetch('config.json');
    if (!cfgResp.ok) { showNotFound(); return; }
    const cfg = await cfgResp.json();

    // Check visibility
    const visResp = await fetch(`${RAW}/${cfg.repo}/${cfg.branch}/visibility.json`);
    const visible = visResp.ok ? await visResp.json() : [];
    if (!visible.includes(filePath)) { showNotFound(); return; }

    // Fetch markdown
    const mdResp = await fetch(`${RAW}/${cfg.repo}/${cfg.branch}/${filePath}`);
    if (!mdResp.ok) { showNotFound(); return; }

    const text = await mdResp.text();
    const { meta, body } = parseFrontmatter(text);

    const title = meta.title || slugToTitle(filePath);
    const date  = extractDate(filePath, meta);

    document.title = title;
    document.getElementById('postTitle').textContent = title;

    const dateEl = document.getElementById('postDate');
    if (date) {
      dateEl.textContent = date;
    } else {
      dateEl.style.display = 'none';
    }

    // Render markdown
    marked.setOptions({ breaks: true, gfm: true });
    document.getElementById('articleBody').innerHTML = marked.parse(body);

    // Show post
    document.getElementById('stateLoading').style.display = 'none';
    document.getElementById('postWrap').style.display = 'block';

    // Giscus comments
    if (cfg.giscus?.enabled && cfg.giscus?.repoId && cfg.giscus?.categoryId) {
      const wrap = document.getElementById('commentsWrap');
      wrap.style.display = 'block';

      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo',              cfg.giscus.repo);
      s.setAttribute('data-repo-id',           cfg.giscus.repoId);
      s.setAttribute('data-category',          cfg.giscus.category || 'General');
      s.setAttribute('data-category-id',       cfg.giscus.categoryId);
      s.setAttribute('data-mapping',           'pathname');
      s.setAttribute('data-strict',            '0');
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata',     '0');
      s.setAttribute('data-input-position',    'top');
      s.setAttribute('data-theme',             cfg.giscus.theme || 'light');
      s.setAttribute('data-lang',              'en');
      s.setAttribute('crossorigin',            'anonymous');
      s.async = true;
      document.getElementById('giscusMount').appendChild(s);
    }
  }

  function showNotFound() {
    document.getElementById('stateLoading').style.display = 'none';
    document.getElementById('stateNotFound').style.display = 'block';
  }

  /* ─── Share button ──────────────────────────────────────────────── */
  document.getElementById('shareBtn').addEventListener('click', async () => {
    const btn = document.getElementById('shareBtn');
    const url = window.location.href;
    try {
      await navigator.clipboard.writeText(url);
    } catch {
      // Fallback for browsers without clipboard API
      const ta = document.createElement('textarea');
      ta.value = url;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    btn.textContent = '✓ Link copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        aria-hidden="true">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" y1="2" x2="12" y2="15"/>
      </svg> Share`;
      btn.classList.remove('copied');
    }, 2200);
  });

  /* ─── Boot ──────────────────────────────────────────────────────── */
  loadPost().catch(() => showNotFound());
</script>
</body>
</html>
